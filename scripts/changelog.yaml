releases:
  - version: 2.0.0
    date: "2026-03-26"
    added:
      - >-
        Global config — all project config and runtime state moved from .totopo/ in the project directory to
        ~/.totopo/projects/<id>/ on the host machine. Nothing is written to the project directory by default.
      - >-
        Project identity — each project is identified by a SHA-256 hash of its absolute root path, stored as
        ~/.totopo/projects/<id>/. Walk-up resolution from CWD finds the correct project automatically.
      - >-
        Container naming v2 — containers and images are now named totopo-<8-char-hash>-<slug> (e.g.
        totopo-a3f9c812-my-app), guaranteeing uniqueness across projects while keeping docker ps output readable.
      - >-
        totopo.yaml anchor file — replaces totopo.json. YAML format with a rich comment block explaining purpose and
        field usage. Parsed via js-yaml. Contains optional name and description fields for onboarding welcome messages.
      - >-
        Manage totopo menu — global menu always accessible from the project menu or when running outside any project.
        Actions: Stop containers, Clear agent memory, Remove images, Reset API keys, Doctor, Uninstall totopo. All
        multi-select actions work across all registered projects.
      - >-
        Uninstall totopo — new action in Manage totopo that stops all containers, removes all images, and deletes
        ~/.totopo/ entirely. Requires typing "uninstall-totopo" to confirm.
      - >-
        Add project anchor — new project menu action for projects onboarded as local-only. Creates totopo.yaml at the
        project root with optional name/description. Menu item disappears immediately after creation.
      - >-
        Non-git project support — git is no longer a hard requirement. Onboarding proceeds with a one-time warning when
        no version control is detected; acknowledgement is stored in meta.json.
    changed:
      - >-
        Source restructured — src/releases/ moved to scripts/ (root level); src/core/commands/ flattened to
        src/commands/; src/core/lib/ flattened to src/lib/. src/core/ deleted entirely.
      - >-
        Function renames for clarity — scanCwdDepth2 -> buildDirectoryTree, expandExclusion ->
        expandDirectoryToChildren, normalizeSelection -> collapseToMinimalPaths, promptDeeperPaths ->
        promptAdditionalPaths, tildefy -> toTildePath, shortHash -> truncateHash, dim -> dimText.
      - >-
        Pre-commit checks extended — pnpm check now auto-fixes divider comment lines to 140 chars (ASCII only, fails for
        review after fixing) and flags non-ASCII special characters in comments (no auto-fix).
      - >-
        AGENTS.md rewritten at repo root — replaces docs/AGENTS.md with a complete project reference covering key
        concepts, full file structure, global config layout, commands, workflow notes, and agent rules.
      - >-
        README improvements — Node.js added to Requirements; How totopo Works section rewritten to lead with the project
        concept; demo GIF placeholders commented out pending re-recording.
      - >-
        Back delay removed — the 500 ms sleep after selecting Back in the Manage totopo menu is removed; the delay after
        Doctor is kept.
      - >-
        pnpm rebuild script added — shorthand for rm -rf dist && tsc -p tsconfig.build.json; useful after structural or
        rename changes.
      - >-
        Onboarding rewritten — new flow: detect git root / totopo.yaml context, confirm project root, conflict guard,
        non-git warning, runtime mode and tool selection, shared/local scope choice, then write all config to
        ~/.totopo/projects/<id>/.
      - >-
        Project menu restructured — Open session, Rebuild container, Stop container, Runtime mode, Add project anchor
        (conditional), Manage totopo →. Settings renamed to Runtime mode.
      - >-
        Doctor accepts null projectDir — passing null skips the Dockerfile existence check, allowing Doctor to run from
        the global Manage totopo menu outside any project context.
      - strip-json-comments removed — replaced by js-yaml for totopo.yaml parsing. jsonc.ts deleted.
      - docker-name.ts deleted — container naming logic absorbed into project-identity.ts.
      - templates/README.md deleted — no longer auto-copied to projects in v2 (nothing is written to the project).
      - >-
        README rewritten for v2 — project concept introduced with menu walkthrough, config location updated to
        ~/.totopo/, git removed from requirements, new What gets installed section, Shared onboarding and Limitations
        sections added.
    fixed:
      - >-
        status alias wrong path also present in generate-dockerfile.ts — the dynamically generated Dockerfile (used in
        host-mirror mode) embedded the same /workspace/.totopo/post-start.mjs alias as the static template; corrected to
        /home/devuser/.totopo/post-start.mjs.
      - >-
        status alias in Dockerfile pointed to /workspace/.totopo/post-start.mjs — corrected to
        /home/devuser/.totopo/post-start.mjs, which is where the project config dir is mounted at runtime. Running
        'status' in a clean project previously crashed with MODULE_NOT_FOUND.
  - version: 1.0.8
    date: "2026-03-25"
    changed:
      - >-
        Selective scope picker now explains the two-level terminal view and how to handle deeper inclusions or
        exclusions by path.
    fixed:
      - >-
        Docker image and container names are now derived through a shared helper, so repositories with uppercase names
        no longer fail Docker builds.
  - version: 1.0.7
    date: "2026-03-24"
    changed:
      - >-
        README.md rewritten to clarify totopo's repo-level install model, scope flow, and one-container-per-repository
        behavior.
    fixed:
      - >-
        Advanced > Rebuild now returns a rebuild signal so totopo immediately launches a fresh dev session after
        removing the project image.
      - >-
        Remaining dynamic imports removed from bin/totopo.js and src/core/commands/advanced.ts in favor of static
        imports.
  - version: 1.0.6
    date: "2026-03-21"
    changed:
      - Updated docs.
  - version: 1.0.5
    date: "2026-03-21"
    changed:
      - README.md updates, demo GIFs added.
      - Totopo banner updated.
      - CONTRIBUTING.md introduced.
      - CLAUDE.md removed.
      - ROADMAP.md "Working Now" section cleared.
  - version: 1.0.4
    date: "2026-03-20"
    changed:
      - Updated package logo in README.md.
  - version: 1.0.3
    date: "2026-03-20"
    changed:
      - >-
        Onboarding intro spacing — blank line added before the intro line (separates it from the npx command in the
        terminal) and between the intro line and the info box.
      - >-
        Onboarding info box title removed — redundant subtitle eliminated; the intro line and box content (project name
        + location) are self-explanatory.
      - >-
        README rewritten — added logo and npm badges, new Features at a Glance section, expanded sandboxing and scoped
        mounts descriptions, video placeholders updated, file tree mount annotations changed from arrows to comments,
        disclaimer trimmed.
      - >-
        Onboarding output uses tilde-relative paths — absolute home directory prefix replaced with ~/ in the .totopo
        location box and the global .env hint line. Hint wording updated from "every container" to "every totopo
        container".
      - >-
        README onboarding description simplified — one-time onboarding flow reference replaces the previous verbose
        description that incorrectly mentioned API key prompts.
      - >-
        Docs restructured — INBOX.md removed, WORK.md renamed to ROADMAP.md, architecture section moved from ROADMAP
        into AGENTS.md, VISION.md content merged into README and removed, Environment section removed from AGENTS.md,
        RELEASES.md checklist updated.
      - Dead env vars removed — TOTOPO_PACKAGE_DIR and TOTOPO_REPO_ROOT removed from bin/totopo.js; they were unused.
      - .totopo/Dockerfile comment corrected — kilo removed from the AI tools list in the header comment.
    fixed:
      - >-
        Onboarding intro spacing — log.message("") replaced with process.stdout.write("\n") to produce a single blank
        line between the intro and the info box; log.message renders an extra clack rail character that caused double
        spacing.
      - >-
        Remaining absolute paths in onboarding output tilde-relative — ~/.totopo/.env "already exists" and "Created" log
        lines now use tildefy(), consistent with all other path output.
  - version: 0.9.0
    date: "2026-03-20"
    added:
      - >-
        Reset API keys — new Advanced menu option that overwrites ~/.totopo/.env with the template, with a confirmation
        prompt warning that the action affects all totopo projects on the machine.
      - >-
        Menu hints — contextual hints added to all main menu and Advanced menu options, visible when the option is
        highlighted before confirming.
      - >-
        Multi-agent context injection — on every session start, totopo now injects a context file into the global config
        location of all four supported agents: Claude Code (~/.claude/CLAUDE.md), OpenCode
        (~/.config/opencode/AGENTS.md), Kilo (~/.config/kilo/AGENTS.md), and Codex (~/.codex/AGENTS.md). All four tools
        receive identical treatment — same content, same always-overwrite behaviour. No project files are read or
        modified; agents discover project-level CLAUDE.md/AGENTS.md through their own file-walk logic.
      - >-
        Agent session persistence — each agent tool gets its own read-write bind mount from .totopo/agents/<tool>/ into
        the container (e.g. .totopo/agents/claude/ → ~/.claude/). Session history, conversation transcripts, and SQLite
        databases survive container rebuilds and restarts. Directories are created lazily on first session start.
      - >-
        Git availability and remote-block context — injected agent context now explicitly documents git availability per
        scope: repo scope has full local git but remote access (push/pull/fetch) is blocked container-wide by
        protocol.allow=never; cwd and selective scopes additionally have no .git mount (intentional security boundary to
        prevent access to full commit history outside the mount).
      - >-
        Selective scope file-creation warning in agent context — in selective mode, agents are instructed to notify the
        user before creating files outside mounted paths, explain that such files will not sync to the host, and suggest
        running the operation on the host instead.
      - >-
        Scoped workspace notice — when the user selects cwd or selective scope, a warning is shown listing what may not
        be available to the agent: personal host agent config files, project-level context files outside the mount, and
        git.
      - >-
        OpenAI Codex added — @openai/codex installed in the container image (both full and host-mirror Dockerfiles).
        codex added to post-start.mjs readiness check. .totopo/agents/codex/ mounted at ~/.codex/ for persistence.
      - >-
        Clear agent memory — new action in the Advanced submenu wipes .totopo/agents/ for the current project, resetting
        all agent session data. If the project container is running, the user is prompted to stop it first. Context is
        regenerated on the next session start.
      - >-
        Advanced submenu — replaces the previous separate Settings, Rebuild, Doctor, and Manage workspaces menu entries
        with a single looping submenu. All options return to Advanced via Back. Stop containers and Remove images carry
        an "all projects" hint to distinguish them from project-scoped actions.
    changed:
      - >-
        post-start.mjs Ready block — status hint moved to grey line immediately under Ready; agent run hint moved to
        .bashrc so it prints in default white on every shell start, followed by a blank line before the prompt.
      - >-
        post-start.mjs summary — AI tools section now reprinted just before Ready so versions are visible at a glance
        without scrolling. Ready notice is followed by a hint line: run 'opencode', 'claude', or 'codex' to start an
        agent, or 'status' to recheck.
      - post-start.mjs API keys message updated to reference ~/.totopo/.env on the host rather than .totopo/.env.
      - >-
        Kilo removed — @kilocode/cli uninstalled from the container image; kilo volume mounts, agent context injection,
        and all references removed. Supported tools are now opencode, claude, and codex.
      - >-
        API keys moved to ~/.totopo/.env — keys are no longer stored in .totopo/.env inside the project repo. The global
        file lives outside all project directories and is never mounted into the container, preventing agents from
        reading it regardless of workspace scope. The .totopo/.env gitignore entry is no longer added during onboarding.
      - >-
        Status box updated — keys line added showing ~/.totopo/.env so the key file location is always visible at a
        glance. hasKey field removed from MenuArgs (was unused).
      - Advanced menu reordered — Doctor moved to the bottom above Back; Reset API keys placed after Remove images.
      - >-
        templates/env restructured — strong security warning header added; keys reordered with OpenCode providers first
        (OpenAI, Anthropic, Gemini, xAI, Groq, OpenRouter); Kilo key removed; one comment per key, no filler text.
      - >-
        AI tools order updated — opencode listed first in Dockerfile npm install, post-start.mjs checks, README, and all
        documentation to reflect its role as the primary multi-provider tool.
      - >-
        Main menu simplified to four items: Open session, Stop dev container (conditional on container running),
        Advanced, Quit. Rebuild, Settings, Doctor, and Manage workspaces removed from the top level.
      - >-
        Runtime mode replaces Settings as the label for the mode-switching action — reflects what it actually does
        rather than using a generic label.
      - >-
        injectAgentContext() rewritten — context files are written directly to .totopo/agents/ on the host via
        fs.writeFileSync before the container starts, then served into the container through volume mounts. No docker
        cp, no temp files, no Docker commands required for injection.
      - >-
        .totopo/agents/ gitignored by default — onboarding now adds .totopo/agents/ to .gitignore (shared commit scope)
        so agent session data is never committed.
      - >-
        docs/AGENTS.md made tool-agnostic — references to Claude Code replaced with generic "AI agents"; environment
        section updated to mention all four tools and totopo's context injection.
      - >-
        .totopo/README.md introduced as a maintained template (templates/README.md) copied during onboarding — documents
        the directory layout including agents/, the security model, all four AI tools, and current menu action names.
        Replaces the stale hand-written file that referenced removed features (devcontainer.json, Reset) and was missing
        codex and the agents/ directory.
    fixed:
      - >-
        API keys info message improved — onboarding and post-start.mjs now read "Optionally add API keys to
        ~/.totopo/.env — all keys are injected into every container at runtime." to clarify that keys are optional and
        explain how they reach the container.
      - >-
        EACCES permission denied on ~/.local/state — npm install -g runs as root before the USER switch, which could
        leave /home/devuser/.local owned by root. Layer 10 now explicitly creates .local/state, .local/share, and
        .local/bin and chowns all of /home/devuser to devuser before switching to the non-root user.
      - >-
        post-start.mjs opencode version check — opencode --version exits non-zero in non-TTY pipe context; check now
        falls back to `which opencode` to confirm the binary is installed before reporting failure.
      - >-
        Menu status box alignment — content was center-aligned causing uneven spacing between labels and values;
        switched to left-aligned so workspace/containers/keys values line up consistently.
      - >-
        Agent context directories are now created with mkdirSync recursive before writing context files, so first-run
        sessions no longer crash when .totopo/agents/ subdirectories do not yet exist.
  - version: 0.8.0
    date: "2026-03-19"
    changed:
      - >-
        Compiled JS entry point — src/core/ is now compiled to dist/ via tsc; tsx moved to devDependencies;
        bin/totopo.js imports from dist/ directly, eliminating runtime transpilation and reducing startup time by
        ~200-400 ms.
  - version: 0.7.0
    date: "2026-03-18"
    added:
      - >-
        Rebuild menu item — stops this project's container (if running) and removes its image, then immediately launches
        a fresh build via dev.ts. Only shown when the project image exists.
      - >-
        Manage workspaces submenu — groups cross-project housekeeping behind a dedicated entry: stop running containers
        (multiselect), remove images (multiselect with workspace labels, stops dependent containers first), and
        uninstall from this project (stops container, removes image, deletes .totopo/).
      - >-
        Back option added to Settings menu — selecting it returns to the main menu without saving changes, consistent
        with the Back behaviour in Manage workspaces.
    changed:
      - >-
        Stop menu item is now project-scoped — targets only this project's container (totopo-managed-<project>) and
        shows a confirmation prompt before stopping. Previously stopped all totopo containers globally.
      - >-
        Stop and Rebuild are conditionally shown — Stop appears only when this project's container is running; Rebuild
        appears only when this project's image exists.
      - >-
        Reset (wipe workspaces + images) removed from the top-level menu — its functionality is now available through
        Manage workspaces → Remove images and Manage workspaces → Uninstall from this project.
      - >-
        Status box redesigned — title simplified to "totopo"; content now shows workspace name and container count
        ("none" / "1 running" / "N running"). API key indicator removed from the box.
      - >-
        post-start.mjs API keys section no longer warns per-key — replaced with a single info line ("Optionally add API
        keys to .totopo/.env before starting the container."), matching the message shown at the end of onboarding.
    fixed:
      - >-
        Back in Manage workspaces submenu now returns to the main menu instead of exiting — bin/totopo.js wraps the menu
        loop and re-shows the main menu when manage.ts exits with code 2 (back signal).
      - >-
        Dependency install message changed from "Installing totopo dependencies…" to "Getting ready…" and is now cleared
        from the terminal once installation completes.
      - >-
        docs: WORK.md architecture tree corrected — reset.ts renamed to rebuild.ts, manage.ts and check.ts added as
        missing entries.
  - version: 0.6.1
    date: "2026-03-17"
    changed:
      - >-
        Selective scope deeper-path step now uses @clack/prompts path() for autocomplete-based path selection instead of
        free-style text input — as the user types, matching files and directories under the current working directory
        are shown; blank Enter exits the loop. Fixes the previous attempt by converting the absolute path returned by
        path() to a relative path via relative(cwd, result).
      - >-
        Deeper-path loop redesigned — selecting a path now adds it directly as a single entry without a nested
        multiselect step; loop is controlled by an explicit Yes/No confirm question ("Add a nested path by path?") that
        repeats after each addition until the user answers No.
    fixed:
      - "path() prompt now correctly passes directory: false to show both files and directories in suggestions."
      - >-
        Selective scope path() prompt now shows directories — the directory option was set to false which, contrary to
        the docs, filters directories out; set to true to show both files and directories.
      - >-
        Selecting "done" in the deeper-path loop now uses Escape instead of blank Enter — the library hardcodes a
        "Please select a path" error for empty input that cannot be overridden via validate; Escape (isCancel) is
        treated as loop exit instead of a full cancellation.
  - version: 0.6.0
    date: "2026-03-17"
    added:
      - >-
        Selective scope now shows hidden files and directories (dotfiles/dotdirs such as .env, .github, .vscode) in the
        multiselect — previously all entries beginning with "." were filtered out and could not be mounted.
      - >-
        Selective scope gains an optional path input step after the multiselect — users can enter comma-separated
        relative paths (e.g. src/auth, src/db/migrations) to include deeply nested items not reachable from the
        top-level picker; invalid paths produce an error and exit cleanly.
    changed:
      - >-
        Selective scope UX overhauled — the flat multiselect + freeform text input is replaced by a depth-2 tree picker
        using groupMultiselect (directory headers are expandable and selectable as a group) followed by a repeating path
        autocomplete prompt for targets deeper than two levels. "Except" mode pre-selects all depth-1 items;
        checking/unchecking a folder header includes or excludes its entire contents. Falls back to a flat multiselect
        when the current directory contains no subdirectories.
      - >-
        Selective scope "except" mode now collapses fully-selected groups back to the parent directory name for
        efficient mounting, instead of listing individual depth-2 children.
      - >-
        Space/Enter keyboard instructions shown before the path picker in both "only" and "except" modes; removed the
        prior tip messages that referenced UI elements not yet visible.
      - >-
        Selective scope deeper-path step replaced the single-item select-based directory browser with a type-prefix +
        multiselect flow — user types a path prefix (e.g. src/ or src/api), sees a one-level-deep multiselect of that
        directory's contents, picks items with Space, confirms with Enter; loop repeats until blank Enter.
        groupMultiselect can now be skipped with blank Enter to go straight to this step. .totopo/ is filtered from the
        top-level picker. A summary of all selected paths is shown before the container starts.
      - >-
        Selective scope deeper-path prompt now shows a concrete example derived from the actual current directory (e.g.
        the real first subdirectory and one of its children) instead of the generic "src/ or src/api" placeholder, and
        the hint explicitly states that a path relative to the current directory is expected.
      - >-
        Selective scope readability improvements — groupMultiselect hint lines now mention the deeper-path step and how
        to skip directly to it; the deeper-path prompt clarifies paths are added one at a time with blank Enter to
        finish; the final mounted-paths summary is rendered as a titled note box with one path per line instead of a
        single joined line.
    fixed:
      - >-
        Selective scope "except" mode nested exclusion — entering a nested path in the text step now correctly excludes
        it by recursively expanding its parent directory into individual children and dropping the target, rather than
        incorrectly adding it as an extra mount.
      - >-
        Selective scope groupMultiselect group headers were permanently stuck selected — dir names were placed in
        initialValues which clack never removes when toggling; initialValues now uses the actual child values so headers
        derive their checked state from children and toggle correctly with Space.
      - Minor fixes.
      - >-
        Selective scope deeper-path step replaced clack's path prompt (which showed only files and broke on absolute
        paths) with a custom select-based directory browser that shows both files and directories, supports navigating
        up, and lets the user select a directory or file before returning the relative path.
  - version: 0.5.0
    date: "2026-03-17"
    added:
      - >-
        Workspace scoping — on every session start the user chooses how much of the project to expose: full repo root
        (previous default), current directory only, or a selective set of files/folders from the current directory.
        Selective mode offers an "only the following" or "all except for" style picker followed by a multiselect of
        non-dotfiles in the current directory.
      - >-
        Agent context injection — on every new container start, a ~/.claude/CLAUDE.md is written inside the container
        describing the active scope (which paths are mounted, what operations require the host) plus the full content of
        the project's CLAUDE.md. The agent always knows it is running inside a totopo dev container.
      - >-
        Scope mismatch detection — when reconnecting to a stopped or running container whose workspace was scoped to a
        different directory, totopo warns and offers to recreate the container with a fresh scope or continue with the
        existing one.
      - >-
        Scope labels and env vars — the active scope is stored as Docker labels (totopo.scope, totopo.scope.cwd,
        totopo.scope.paths) for mismatch detection and exposed inside the container as TOTOPO_SCOPE, TOTOPO_HOST_CWD,
        and TOTOPO_SELECTIVE_PATHS.
    changed:
      - >-
        Scope selection now always appears on Start session — previously skipped when a compatible container already
        existed; selecting the same scope connects or resumes directly, selecting a different scope recreates silently
        without a confirmation prompt
      - >-
        src/core/ restructured into commands/ (entry points invoked by the CLI) and lib/ (shared utilities);
        settings-menu.ts renamed to commands/settings.ts, settings.ts renamed to lib/config.ts
      - >-
        ai.sh replaced by bin/totopo.js — the entry point is now a plain Node.js ESM script; tsx is no longer needed to
        bootstrap the CLI, only to run the TypeScript command files
      - package.json bin updated to ./bin/totopo.js; pnpm start added as a local dev alias
    fixed:
      - >-
        CWD scope created an empty .totopo/ directory inside the selected directory — Docker was creating the nested
        mount point on the host because /workspace itself is a bind mount of cwd; .totopo is now mounted at
        /home/devuser/.totopo inside the container for cwd and selective scopes, keeping the host directory clean
      - >-
        Starting a session from a nested directory did not prompt for scope when an existing repo-scoped container was
        present — repo mode no longer suppresses the scope prompt on reconnect
  - version: 0.4.0
    date: "2026-03-17"
    changed:
      - >-
        DevPod removed — container lifecycle and shell access now use raw Docker directly; docker build + docker run
        replace devpod up, and docker exec -it replaces devpod ssh. No SSH daemon, no open port, no key management.
        DevPod CLI is no longer a prerequisite.
      - >-
        Onboarding no longer creates devcontainer.json — only Dockerfile and post-start.mjs are copied to .totopo/; the
        devcontainer.json template has been removed from the package
      - >-
        Doctor command no longer checks for DevPod or its provider — only Docker installed and Docker running are
        checked; .totopo/ config check now requires only Dockerfile (not devcontainer.json)
    fixed:
      - >-
        Container exited immediately after docker run -d — bash has no TTY in detached mode; docker run now passes sleep
        infinity as the command to keep the container alive for docker exec to connect
  - version: 0.3.0
    date: "2026-03-16"
    added:
      - >-
        Onboarding commit scope prompt — after mode and tool selection, users now choose whether .totopo/ config is
        shared (only .env gitignored, as before) or local-only (entire .totopo/ directory added to .gitignore)
  - version: 0.2.0
    date: "2026-03-16"
    added:
      - >-
        Dockerfile runtime mode — two modes: host-mirror (default) detects host runtimes and lets the user pick which
        tools to include via multiselect, with detected tools pre-checked at their host version; full restores the
        previous behaviour (latest stable everything). Mode is stored in .totopo/settings.json and committed with the
        project.
      - >-
        Host runtime detection — reads node, python3, go, cargo, java, and bun versions installed on the host machine
        and uses them when generating the container Dockerfile, so both environments run the same versions.
      - >-
        Dockerfile auto-sync — on every totopo invocation, host runtimes are re-detected and the Dockerfile regenerated
        if anything changed; a warning is printed so the user knows the container will rebuild on next start.
      - >-
        Settings menu — new Settings entry in the main menu allows switching runtime mode and re-selecting tools at any
        time without re-running onboarding.
    fixed:
      - >-
        Node.js removed from tool multiselect checkbox list — shown as a fixed "always included" line above the prompt
        instead, making it impossible to accidentally deselect it
      - >-
        Keyboard instructions (Space to toggle · Enter to confirm) now appear on a dedicated line beneath the
        multiselect header instead of inline to its right
      - >-
        pnpm rc now hard-blocks if in_progress.entries has no entry matching the computed next rc version, preventing
        releases without changelog notes
      - package.json written with 4-space indentation by rc and rc:promote, fixing pnpm check failures after each run
      - >-
        Tool multiselect pre-selection was broken — @clack/prompts multiselect requires initialValues at the call level,
        not a selected field on each option; detected host tools now correctly appear checked on open
      - >-
        Node.js was not always pre-selected — initialValues now unconditionally includes node regardless of whether host
        detection succeeded; hint updated to "always included"
      - >-
        post-start.mjs showed "✓ not found" for optional runtimes not installed in the container — optional runtimes
        (bun, uv, go, cargo, java) now display as "– skipped" in grey when absent
      - Added Space to toggle · Enter to confirm keyboard hint to tool multiselect prompt
  - version: 0.1.7
    date: "2026-03-16"
    changed:
      - >-
        Dev container overhauled from node:22-bookworm-slim to debian:bookworm-slim with full multi-stack support —
        Node.js LTS (NodeSource), Python 3.11 + uv + poetry, Go (latest stable), Rust (rustup stable + rustfmt +
        clippy), Java Temurin 21 JDK + Maven, Bun; dev tools added: ripgrep, fd, fzf, yq, GitHub CLI; post-start.mjs
        readiness check extended with Runtimes (all new stacks) and Dev tools sections
  - version: 0.1.6
    date: "2026-03-16"
    changed:
      - >-
        pnpm rc and pnpm rc:promote are now idempotent — re-running after any mid-flow failure (network drop, npm
        timeout, git push error) skips already-completed phases (commit, push, publish, tag) and resumes from where it
        left off
      - >-
        pnpm rc:promote now guards against uncommitted changes before the release flow starts — changes overlapping
        packaged files (ai.sh, src/core/, templates/, tsconfig.json, LICENSE, package.json) cause a hard stop with
        instructions; non-packaged changes offer stash, auto-commit, or cancel
  - version: 0.1.5
    date: "2026-03-16"
    changed:
      - >-
        Workspace prefix renamed from totopo- to totopo-managed- to avoid collisions with user's own Docker containers
        or images
      - >-
        Dockerfile template now carries LABEL totopo.managed=true so images have a stable identity independent of
        workspace state
    fixed:
      - >-
        Reset failed to find and remove Docker images when workspace no longer existed — image cleanup now uses
        label-based lookup (totopo.managed=true) instead of name-derived reference filter
  - version: 0.1.4
    date: "2026-03-15"
    changed:
      - >-
        scripts/ restructured into src/core/ (user-facing CLI, included in npm package) and src/releases/ (developer
        release tooling, excluded from npm)
      - >-
        src/releases/changelog.yaml introduced as source of truth for release notes; CHANGELOG.md is now a generated
        artifact (pnpm generate-changelog)
      - pnpm rc:promote now squashes rc changelog entries and regenerates CHANGELOG.md automatically
      - Onboarding info box uses centered, rounded style
    fixed:
      - >-
        npx totopo fails on second invocation — auto-install now checks for tsx binary directly instead of node_modules/
        directory (node_modules may exist but be incomplete after pnpm store cleanup or partial npx cache)
      - gh CLI auth error now surfaced in sync-github-releases warning instead of swallowed silently
      - >-
        Start session fails on stopped workspace — devpod up is now always run before ssh (it is idempotent), fixing the
        'cannot build in this mode' error when the container existed but was not running
      - >-
        GitHub release sync reported nothing to sync immediately after publish — now polls npm registry until the new
        version is visible before syncing
      - >-
        pnpm rc no longer prompts for changelog notes interactively — hard-blocks at startup if in_progress.entries is
        empty, directing the user to edit changelog.yaml first
      - >-
        Container startup fails — post-start.mjs imported @clack/prompts which is not available inside the container;
        replaced with plain ANSI console output using Node.js built-ins only
  - version: 0.1.3
    date: "2026-03-14"
    fixed:
      - >-
        Onboarding crash — devcontainer.json template contains // comments (valid devcontainer spec, invalid
        JSON.parse); substitution now uses plain string replace, preserving comments in the output
  - version: 0.1.2
    date: "2026-03-14"
    fixed:
      - >-
        npx totopo symlink resolution — PACKAGE_DIR now correctly resolves to the package root when invoked via npx (was
        resolving to .bin/ directory, causing wrong node_modules and tsx paths)
  - version: 0.1.1
    date: "2026-03-14"
    fixed:
      - >-
        npx totopo onboarding failure — tsx moved to dependencies and resolved from the package directory rather than
        expected globally
      - Container startup status now shows pnpm version alongside node and npm
    changed:
      - pnpm added to container image (Dockerfile + template)
      - ai.sh auto-install falls back to npm if pnpm is unavailable
      - README rewritten to reflect npx totopo workflow; removed stale Next.js reference and internal repo structure
  - version: 0.1.0
    date: "2026-03-13"
    added:
      - "Interactive clack-based menu: Start session, Stop all, Reset, Doctor"
      - >-
        Automatic onboarding: detects missing .totopo/, copies templates, substitutes project name, creates .env,
        updates .gitignore
      - "Doctor command: checks Docker, DevPod, provider, and API key readiness (silent pre-menu, verbose on demand)"
      - >-
        Security model: non-root container user (devuser uid 1001), git remote blocked via protocol.allow never, no
        credential forwarding, no privilege escalation (no-new-privileges:true)
      - TypeScript source via tsx — no compile step required
      - "Workspace naming convention: totopo-<project>"
      - Port cleanup on stop/reset
      - Status box with project name and API key indicator in menu UI
