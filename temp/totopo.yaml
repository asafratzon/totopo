name: test-project
description: Feasibility test for dockerfile_extra injection

# Paths to overlay with container-local storage.
shadow_paths:
  - node_modules
  # - .secrets

# Extra Dockerfile instructions added on top of the totopo base image.
# These are injected at build time - the base Dockerfile is never modified.
dockerfile_extra: |
  RUN apt-get update && apt-get install -y --no-install-recommends python3 && rm -rf /var/lib/apt/lists/*
  # Bun (uncomment to enable):
  # RUN curl -fsSL https://bun.sh/install | bash
