
# totopo workspace config - run 'npx totopo' from anywhere under this directory tree to start your dev container.
# Choose Help in the totopo menu to see the official docs and all configuration options.
# This file may be rewritten by totopo (repair, reset, settings changes). Custom comments will not be preserved.
workspace_id: totopo

# .gitignore-style patterns - agents see an empty, isolated copy instead of the real host data.
shadow_paths:
  - node_modules
  - .env*
